name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reportsafe
          POSTGRES_PASSWORD: reportsafe
          POSTGRES_DB: reportsafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reportsafe -d reportsafe"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5

    env:
      # The test harness strips DATABASE_URL and targets these (5432 in CI).
      TEST_PGHOST: localhost
      TEST_PGPORT: "5432"
      TEST_PGUSER: reportsafe
      TEST_PGPASSWORD: reportsafe
      TEST_PGDATABASE: reportsafe
      # Redis available in CI for integration testing.
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite (Vitest against ephemeral Postgres)
        run: npm test

      - name: Build web frontend
        run: npm run build:web

      - name: Typecheck mobile
        run: cd mobile && npx tsc --noEmit
