name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5

    env:
      # The test harness (tests/_global.setup.js, _env.setup.js) connects here.
      TEST_MONGODB_URI: mongodb://localhost:27017
      TEST_MONGODB_DB: reportsafe_test
      # Redis available in CI for integration testing.
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite (Vitest against ephemeral Postgres)
        run: npm test

      - name: Build web frontend
        run: npm run build:web

      - name: Typecheck mobile
        run: cd mobile && npx tsc --noEmit
