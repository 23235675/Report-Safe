# ============================================================================
# Report Safe — production stack (Azure-friendly)
#
#   Caddy (HTTPS) ──► server-1 ─┐
#                  └► server-2 ─┴► Azure Cosmos DB for MongoDB (managed, external)
#                                  Redis (cross-instance Socket.IO + rate limit)
#
# The DATABASE is NOT in this file: use a managed Azure Cosmos DB for MongoDB
# (or any MongoDB). Provide its connection string via the .env file referenced
# below (MONGODB_URI + MONGODB_DB). See DEPLOYMENT.md for the full env table.
#
# Bring up:   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Scale note: server-1 / server-2 are explicit so Caddy can name them as
#             upstreams. Add server-3 etc. the same way and list them in Caddyfile.
# ============================================================================

services:
  server-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: report-safe-server:latest
    env_file: .env.prod
    environment:
      INSTANCE_ID: server-1
      # Production-safe defaults (override in .env.prod). M2: OTP on; M8: no demo
      # seed; H2: one proxy hop (Caddy). See DEPLOYMENT.md.
      OTP_ENABLED: "true"
      SEED_DATA: "false"
      TRUST_PROXY_HOPS: "1"
    depends_on:
      - redis
    restart: unless-stopped
    expose:
      - "3001"

  server-2:
    # Reuse the image built by server-1 (no second build).
    image: report-safe-server:latest
    env_file: .env.prod
    environment:
      INSTANCE_ID: server-2
      OTP_ENABLED: "true"
      SEED_DATA: "false"
      TRUST_PROXY_HOPS: "1"
    depends_on:
      - server-1
      - redis
    restart: unless-stopped
    expose:
      - "3001"

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    depends_on:
      - server-1
      - server-2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
